<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Two-Factor Verification — MOF Jobs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#f0f4f8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:#fff;border-radius:16px;padding:36px;box-shadow:0 4px 24px rgba(0,0,0,0.08);width:100%;max-width:400px}
    .logo{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#1a3a5c 0%,#0d2236 100%);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:22px;color:#fff}
    h1{font-size:20px;font-weight:800;color:#1a2332;text-align:center;margin-bottom:6px}
    .subtitle{font-size:13px;color:#64748b;text-align:center;margin-bottom:6px}
    .email-badge{display:inline-flex;align-items:center;gap:6px;background:#f1f5f9;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;color:#1a3a5c;margin:0 auto 24px;display:flex;justify-content:center}
    .form-group{margin-bottom:16px}
    label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
    .form-control{width:100%;padding:12px 16px;border:1.5px solid #e2e8f0;border-radius:10px;font-family:inherit;font-size:24px;font-weight:700;letter-spacing:8px;text-align:center;color:#1a2332;transition:border-color 0.15s;outline:none;font-family:monospace}
    .form-control:focus{border-color:#198754;box-shadow:0 0 0 3px rgba(25,135,84,0.12)}
    .btn{width:100%;padding:13px;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.15s}
    .btn-primary{background:linear-gradient(135deg,#198754,#0d6e43);color:#fff;box-shadow:0 2px 8px rgba(25,135,84,0.3)}
    .btn-primary:hover{opacity:0.92;transform:translateY(-1px)}
    .back-link{display:block;text-align:center;margin-top:18px;font-size:12px;color:#94a3b8;text-decoration:none}
    .back-link:hover{color:#64748b}
    .alert{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:16px;display:flex;gap:8px;align-items:flex-start}
    .alert-danger{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
    .alert-success{background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d}
    .icon-shield{width:64px;height:64px;background:#f0fdf4;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px;color:#16a34a}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><i class="bi bi-building-fill"></i></div>

    <div class="icon-shield"><i class="bi bi-shield-lock-fill"></i></div>

    <h1>Two-Factor Verification</h1>
    <p class="subtitle">Enter the 6-digit code from your authenticator app</p>

    {% if email %}
    <div class="email-badge">
      <i class="bi bi-envelope-fill" style="font-size:11px"></i>
      {{ email }}
    </div>
    {% endif %}

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
      <div class="alert alert-{{ category }}">
        <i class="bi bi-{{ 'x-circle-fill' if category == 'danger' else 'check-circle-fill' }}"></i>
        {{ message }}
      </div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.verify_2fa') }}">
      <div class="form-group">
        <label>Authentication Code</label>
        <input type="text" name="code" class="form-control" placeholder="000000"
          maxlength="6" autocomplete="one-time-code" inputmode="numeric"
          pattern="[0-9]{6}" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary">
        <i class="bi bi-shield-check-fill"></i> Verify & Sign In
      </button>
    </form>

    <a href="{{ url_for('auth.login') }}" class="back-link">
      <i class="bi bi-arrow-left"></i> Back to login
    </a>
  </div>
</body>
</html>
