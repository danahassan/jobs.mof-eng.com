{% extends 'base.html' %}
{% block title %}Register — MOF Jobs{% endblock %}

{% block public_content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px">
  <div style="width:100%;max-width:440px">

    <div style="text-align:center;margin-bottom:28px">
      <div style="font-family:var(--font-head);font-size:22px;font-weight:600;color:var(--navy)">MOF Jobs</div>
      <div style="font-size:13px;color:var(--text3);margin-top:4px">Create your candidate account</div>
    </div>

    <div class="card">
      <h2 style="font-family:var(--font-head);font-size:18px;margin-bottom:20px">Create account</h2>

      <form method="POST">
        <input type="hidden" name="is_employer" value="0">
        <div class="form-group">
          <label>Full name</label>
          <input type="text" name="full_name" class="form-control" required value="{{ full_name or '' }}" placeholder="Ahmad Hassan">
        </div>
        <div class="form-group">
          <label>Email address</label>
          <input type="email" name="email" class="form-control" required value="{{ email or '' }}" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Phone <span class="text-muted">(optional)</span></label>
          <input type="tel" name="phone" class="form-control" value="{{ phone or '' }}" placeholder="+964 ...">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" class="form-control" required placeholder="Min. 8 characters">
        </div>
        <div class="form-group">
          <label>Confirm password</label>
          <input type="password" name="confirm_password" class="form-control" required placeholder="Repeat password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center" id="submitBtn">Create account</button>
      </form>

      <div style="text-align:center;margin-top:18px;font-size:13px;color:var(--text3)">
        Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
