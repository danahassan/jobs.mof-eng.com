<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0f1923">
  <title>Opening MOF Jobs</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;padding:0;min-height:100vh;background:#0f1923;color:#fff;
      font-family:'Plus Jakarta Sans','Segoe UI',system-ui,sans-serif;
      -webkit-font-smoothing:antialiased}
    body{display:flex;align-items:center;justify-content:center;
      background:radial-gradient(circle at 50% 35%, rgba(34,197,94,0.18), transparent 60%), #0f1923}
    .wrap{text-align:center;padding:24px;max-width:340px}
    .logo{width:96px;height:96px;border-radius:24px;object-fit:cover;margin:0 auto 18px;display:block;
      box-shadow:0 24px 60px -20px rgba(34,197,94,0.45),0 0 0 1px rgba(255,255,255,0.06)}
    .title{font-weight:700;font-size:22px;letter-spacing:-0.02em;margin:0 0 6px}
    .sub{margin:0;font-size:13.5px;color:rgba(255,255,255,0.62);font-weight:500}
    .spinner{margin:22px auto 0;width:28px;height:28px;border-radius:50%;
      border:2.5px solid rgba(255,255,255,0.12);border-top-color:#22c55e;
      animation:sp 0.8s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <main class="wrap">
    <img class="logo" src="/static/icons/icon-512.png" alt="MOF Jobs">
    <h1 class="title">MOF Jobs Portal</h1>
    <p class="sub">Opening your dashboard…</p>
    <div class="spinner" aria-hidden="true"></div>
  </main>
  <script>
    // Small delay so the splash is visible (looks more app-like)
    setTimeout(() => { window.location.replace("{{ target_url }}"); }, 350);
  </script>
</body>
</html>
